name: Docker Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag suffix (e.g., "hotfix", "test")'
        required: false
        default: 'manual'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env from secret
        run: |
          cat <<'ENVEOF' > .env
          ${{ secrets.PRODUCTION_ENV_FILE }}
          ENVEOF

      - name: Extract frontend build args
        id: frontend-args
        run: |
          set -a && source .env && set +a
          for var in SITE_NAME OG_TITLE OG_DESCRIPTION OG_IMAGE OG_URL OG_TYPE; do
            echo "${var}=${!var}" >> "$GITHUB_OUTPUT"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION=$(node -p "require('./package.json').version")
          PREFIX="ghcr.io/${{ github.repository }}"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            # For releases: version tag + sha + latest
            for SVC in backend frontend admin ingress; do
              {
                echo "${PREFIX}-${SVC}:${TAG}"
                echo "${PREFIX}-${SVC}:${SHA}"
                echo "${PREFIX}-${SVC}:latest"
              } >> "tags-${SVC}.txt"
            done
          else
            TAG="${{ github.event.inputs.tag || 'manual' }}"
            # For manual: tag suffix + version + sha
            for SVC in backend frontend admin ingress; do
              {
                echo "${PREFIX}-${SVC}:${TAG}"
                echo "${PREFIX}-${SVC}:${VERSION}"
                echo "${PREFIX}-${SVC}:${SHA}"
              } >> "tags-${SVC}.txt"
            done
          fi

          # Set multiline outputs
          {
            echo "backend<<EOF"
            cat tags-backend.txt
            echo "EOF"
            echo "frontend<<EOF"
            cat tags-frontend.txt
            echo "EOF"
            echo "admin<<EOF"
            cat tags-admin.txt
            echo "EOF"
            echo "ingress<<EOF"
            cat tags-ingress.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.backend }}

      # Build and push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SITE_NAME=${{ steps.frontend-args.outputs.SITE_NAME }}
            OG_TITLE=${{ steps.frontend-args.outputs.OG_TITLE }}
            OG_DESCRIPTION=${{ steps.frontend-args.outputs.OG_DESCRIPTION }}
            OG_IMAGE=${{ steps.frontend-args.outputs.OG_IMAGE }}
            OG_URL=${{ steps.frontend-args.outputs.OG_URL }}
            OG_TYPE=${{ steps.frontend-args.outputs.OG_TYPE }}
          tags: ${{ steps.tags.outputs.frontend }}

      # Build and push admin image
      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.admin }}

      # Build and push ingress image
      - name: Build and push ingress image
        uses: docker/build-push-action@v6
        with:
          context: apps/ingress
          file: apps/ingress/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.ingress }}
