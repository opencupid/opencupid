name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TURBO_NO_UPDATE_NOTIFIER: 1
      PRISMA_DISABLE_WARNINGS: "true"
      CI: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma
        run: pnpm --filter backend exec npx prisma generate

      - name: Run lint
        run: pnpm lint

      - name: Type check
        if: github.event_name == 'pull_request'
        run: pnpm type-check

      - name: Build frontend
        run: pnpm --filter frontend exec pnpm build-only

      - name: Backend tests
        run: pnpm --filter backend exec vitest run

      - name: Frontend unit tests
        run: pnpm --filter frontend exec vitest run

      - name: Check i18n keys
        run: pnpm i18n:check && pnpm i18n:check:api

      - name: Check for existence of a changeset
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/main