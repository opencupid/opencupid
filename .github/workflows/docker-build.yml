name: Docker Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build (comma-separated: backend,frontend,admin,ingress or "all")'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has-builds: ${{ steps.check.outputs.has-builds }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect which images need building
        id: check
        env:
          FORCE_IMAGES: ${{ github.event.inputs.images || '' }}
        run: |
          PREFIX="ghcr.io/${{ github.repository }}"
          SERVICES=()

          for SVC in backend frontend admin ingress; do
            VERSION=$(node -p "require('./apps/${SVC}/package.json').version")
            TAG="${PREFIX}-${SVC}:${VERSION}"
            BUILD=false

            if [[ -n "$FORCE_IMAGES" ]]; then
              if [[ "$FORCE_IMAGES" == "all" || "$FORCE_IMAGES" == *"$SVC"* ]]; then
                BUILD=true
                echo "✅ ${SVC}@${VERSION} — forced via workflow_dispatch"
              else
                echo "⏭️ ${SVC}@${VERSION} — not requested"
              fi
            else
              if docker manifest inspect "$TAG" > /dev/null 2>&1; then
                echo "⏭️ ${SVC}@${VERSION} — already exists in GHCR"
              else
                BUILD=true
                echo "✅ ${SVC}@${VERSION} — needs building"
              fi
            fi

            if [[ "$BUILD" == "true" ]]; then
              SERVICES+=("$SVC")
            fi
          done

          # The backend bakes __FRONTEND_VERSION__ at compile time (tsup.config.ts reads
          # apps/frontend/package.json). If the frontend version changed and its image is
          # being rebuilt, the existing backend image will contain a stale __FRONTEND_VERSION__,
          # causing a false "update available" on a freshly-deployed instance.
          # Force a backend rebuild whenever the frontend is being rebuilt.
          if [[ " ${SERVICES[*]} " =~ " frontend " && ! " ${SERVICES[*]} " =~ " backend " ]]; then
            BACKEND_VERSION=$(node -p "require('./apps/backend/package.json').version")
            echo "✅ backend@${BACKEND_VERSION} — forced rebuild because frontend version changed (stale __FRONTEND_VERSION__)"
            SERVICES+=("backend")
          fi

          # Build the matrix JSON
          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "has-builds=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No images need building"
          else
            MATRIX='{"include":['
            FIRST=true
            for SVC in "${SERVICES[@]}"; do
              VERSION=$(node -p "require('./apps/${SVC}/package.json').version")
              case "$SVC" in
                ingress) CTX="apps/ingress" ;;
                *)       CTX="." ;;
              esac
              if [[ "$FIRST" != "true" ]]; then MATRIX+=","; fi
              MATRIX+="{\"service\":\"${SVC}\",\"dockerfile\":\"apps/${SVC}/Dockerfile\",\"context\":\"${CTX}\",\"version\":\"${VERSION}\"}"
              FIRST=false
            done
            MATRIX+=']}'
            echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
            echo "has-builds=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        env:
          FORCE_IMAGES: ${{ github.event.inputs.images || '' }}
        run: |
          PREFIX="ghcr.io/${{ github.repository }}"
          echo "### Build matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Version | Build? |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          FRONTEND_NEEDS_BUILD=false
          BACKEND_NEEDS_BUILD=false
          for SVC in backend frontend admin ingress; do
            VERSION=$(node -p "require('./apps/${SVC}/package.json').version")
            TAG="${PREFIX}-${SVC}:${VERSION}"
            BUILD="⏭️"
            if [[ -n "$FORCE_IMAGES" ]]; then
              if [[ "$FORCE_IMAGES" == "all" || "$FORCE_IMAGES" == *"$SVC"* ]]; then
                BUILD="✅"
              fi
            else
              if ! docker manifest inspect "$TAG" > /dev/null 2>&1; then
                BUILD="✅"
              fi
            fi
            [[ "$SVC" == "frontend" && "$BUILD" == "✅" ]] && FRONTEND_NEEDS_BUILD=true
            [[ "$SVC" == "backend" && "$BUILD" == "✅" ]] && BACKEND_NEEDS_BUILD=true
            echo "| ${SVC} | ${VERSION} | ${BUILD} |" >> "$GITHUB_STEP_SUMMARY"
          done
          # Mirror the forced-backend-rebuild logic from the check step above
          if [[ "$FRONTEND_NEEDS_BUILD" == "true" && "$BACKEND_NEEDS_BUILD" == "false" ]]; then
            BACKEND_VERSION=$(node -p "require('./apps/backend/package.json').version")
            echo "| backend | ${BACKEND_VERSION} | ✅ (forced: frontend changed) |" >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has-builds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION="${{ matrix.version }}"
          PREFIX="ghcr.io/${{ github.repository }}"
          SVC="${{ matrix.service }}"

          {
            echo "${PREFIX}-${SVC}:${VERSION}"
            echo "${PREFIX}-${SVC}:${SHA}"
            echo "${PREFIX}-${SVC}:latest"
          } > tags.txt

          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "${PREFIX}-${SVC}:${{ github.event.release.tag_name }}" >> tags.txt
          fi

          {
            echo "tags<<EOF"
            cat tags.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: ${{ steps.tags.outputs.tags }}
