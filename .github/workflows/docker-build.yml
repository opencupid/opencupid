name: Docker Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build (comma-separated: backend,frontend,admin,ingress or "all")'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          FORCE_IMAGES: ${{ github.event.inputs.images || '' }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PREFIX="ghcr.io/${REPO}"
          SHA=$(git rev-parse --short=7 HEAD)

          echo "### Build matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Version | Build? |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"

          for SVC in backend frontend admin ingress; do
            VERSION=$(node -p "require('./apps/${SVC}/package.json').version")
            TAG="${PREFIX}-${SVC}:${VERSION}"
            BUILD=false

            if [[ -n "$FORCE_IMAGES" ]]; then
              if [[ "$FORCE_IMAGES" == "all" || "$FORCE_IMAGES" == *"$SVC"* ]]; then
                BUILD=true
                echo "✅ ${SVC}@${VERSION} — forced via workflow_dispatch"
              else
                echo "⏭️ ${SVC}@${VERSION} — not requested"
              fi
            else
              if docker manifest inspect "$TAG" > /dev/null 2>&1; then
                echo "⏭️ ${SVC}@${VERSION} — already exists in GHCR"
              else
                BUILD=true
                echo "✅ ${SVC}@${VERSION} — needs building"
              fi
            fi

            if [[ "$BUILD" != "true" ]]; then
              echo "| ${SVC} | ${VERSION} | ⏭️ |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            echo "| ${SVC} | ${VERSION} | ✅ |" >> "$GITHUB_STEP_SUMMARY"

            case "$SVC" in
              ingress) CTX="apps/ingress" ;;
              *)       CTX="." ;;
            esac

            TAG_ARGS=(
              -t "${PREFIX}-${SVC}:${VERSION}"
              -t "${PREFIX}-${SVC}:${SHA}"
              -t "${PREFIX}-${SVC}:latest"
            )
            if [[ "$EVENT" == "release" ]]; then
              TAG_ARGS+=(-t "${PREFIX}-${SVC}:${RELEASE_TAG}")
            fi

            docker buildx build \
              --file "apps/${SVC}/Dockerfile" \
              --platform linux/amd64 \
              --push \
              --cache-from "type=gha,scope=${SVC}" \
              --cache-to "type=gha,mode=max,scope=${SVC}" \
              "${TAG_ARGS[@]}" \
              "$CTX"
          done
