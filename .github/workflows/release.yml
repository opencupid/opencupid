name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag suffix (e.g., "hotfix", "test")'
        required: false
        default: 'manual'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env from secret
        run: |
          cat <<'ENVEOF' > .env
          ${{ secrets.PRODUCTION_ENV_FILE }}
          ENVEOF

      - name: Extract frontend build args
        id: frontend-args
        run: |
          set -a && source .env && set +a
          for var in VAPID_PUBLIC_KEY SENTRY_DSN SITE_NAME OG_TITLE OG_DESCRIPTION OG_IMAGE OG_URL OG_TYPE; do
            echo "${var}=${!var}" >> "$GITHUB_OUTPUT"
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION=$(node -p "require('./package.json').version")
          PREFIX="ghcr.io/${{ github.repository }}"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            # For releases: version tag + sha + latest
            for SVC in backend frontend admin ingress; do
              {
                echo "${PREFIX}-${SVC}:${TAG}"
                echo "${PREFIX}-${SVC}:${SHA}"
                echo "${PREFIX}-${SVC}:latest"
              } >> "tags-${SVC}.txt"
            done
          else
            TAG="${{ github.event.inputs.tag || 'manual' }}"
            # For manual: tag suffix + version + sha + latest
            for SVC in backend frontend admin ingress; do
              {
                echo "${PREFIX}-${SVC}:${TAG}"
                echo "${PREFIX}-${SVC}:${VERSION}"
                echo "${PREFIX}-${SVC}:${SHA}"
                echo "${PREFIX}-${SVC}:latest"
              } >> "tags-${SVC}.txt"
            done
          fi

          # Set multiline outputs
          {
            echo "backend<<EOF"
            cat tags-backend.txt
            echo "EOF"
            echo "frontend<<EOF"
            cat tags-frontend.txt
            echo "EOF"
            echo "admin<<EOF"
            cat tags-admin.txt
            echo "EOF"
            echo "ingress<<EOF"
            cat tags-ingress.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.backend }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VAPID_PUBLIC_KEY=${{ steps.frontend-args.outputs.VAPID_PUBLIC_KEY }}
            SENTRY_DSN=${{ steps.frontend-args.outputs.SENTRY_DSN }}
            SITE_NAME=${{ steps.frontend-args.outputs.SITE_NAME }}
            OG_TITLE=${{ steps.frontend-args.outputs.OG_TITLE }}
            OG_DESCRIPTION=${{ steps.frontend-args.outputs.OG_DESCRIPTION }}
            OG_IMAGE=${{ steps.frontend-args.outputs.OG_IMAGE }}
            OG_URL=${{ steps.frontend-args.outputs.OG_URL }}
            OG_TYPE=${{ steps.frontend-args.outputs.OG_TYPE }}
          tags: ${{ steps.tags.outputs.frontend }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.admin }}

      - name: Build and push ingress image
        uses: docker/build-push-action@v6
        with:
          context: apps/ingress
          file: apps/ingress/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.ingress }}

  sentry-sourcemaps:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: pnpm --filter frontend build-only

      - name: Build backend
        run: pnpm --filter backend prisma:generate && pnpm --filter backend build

      - name: Upload frontend sourcemaps
        run: |
          pnpm exec sentry-cli --url ${{ secrets.SENTRY_URL }} sourcemaps inject ./apps/frontend/dist
          pnpm exec sentry-cli --url ${{ secrets.SENTRY_URL }} sourcemaps upload \
            --org gaians_org --project gaians \
            --release "frontend@${{ steps.version.outputs.version }}" \
            ./apps/frontend/dist
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload backend sourcemaps
        run: |
          pnpm exec sentry-cli --url ${{ secrets.SENTRY_URL }} sourcemaps inject ./apps/backend/dist
          pnpm exec sentry-cli --url ${{ secrets.SENTRY_URL }} sourcemaps upload \
            --org gaians_org --project gaians \
            --release "api@${{ steps.version.outputs.version }}" \
            ./apps/backend/dist
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
