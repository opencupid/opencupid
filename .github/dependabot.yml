version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10

    # Pin prisma to v6 — suppress all PRs for v7+
    ignore:
      - dependency-name: 'prisma'
        versions: ['>=7']
      - dependency-name: '@prisma/client'
        versions: ['>=7']

    groups:
      # ── Vendor families (minor + patch only; majors get individual PRs) ──

      fortawesome:
        patterns: ['@fortawesome/*']
        update-types: ['minor', 'patch']

      sentry:
        patterns: ['@sentry/*']
        update-types: ['minor', 'patch']

      fastify:
        patterns: ['fastify', 'fastify-plugin', '@fastify/*']
        update-types: ['minor', 'patch']

      prisma:
        patterns: ['prisma', '@prisma/*', 'prisma-*', 'prisma-zod-generator', 'zod-prisma-*']
        update-types: ['minor', 'patch']

      vue-ecosystem:
        patterns: ['vue', 'vue-router', 'vue-i18n', '@vue/*', '@vueuse/*', 'pinia']
        update-types: ['minor', 'patch']

      bootstrap:
        patterns: ['bootstrap', 'bootstrap-vue-next', '@popperjs/*']
        update-types: ['minor', 'patch']

      tensorflow:
        patterns: ['@tensorflow/*', '@tensorflow-models/*']
        update-types: ['minor', 'patch']

      fontsource:
        patterns: ['@fontsource/*']
        update-types: ['minor', 'patch']

      # ── Tooling families (minor + patch only) ─────────

      eslint:
        patterns: ['eslint', 'eslint-*', '@eslint/*', '@typescript-eslint/*', '@vue/eslint-*']
        update-types: ['minor', 'patch']

      vite:
        patterns: ['vite', '@vitejs/*', 'vite-*']
        update-types: ['minor', 'patch']

      testing:
        patterns: ['vitest', '@vitest/*', '@vue/test-utils', '@playwright/*', 'happy-dom', 'jsdom']
        update-types: ['minor', 'patch']

      types:
        patterns: ['@types/*']
        update-types: ['minor', 'patch']

      i18n:
        patterns: ['i18next', 'i18next-*', 'vue-i18n-*', 'i18n-*', '@cospired/i18n-*', '@intlify/*']
        update-types: ['minor', 'patch']

      # ── Catch-all: remaining deps (minor + patch only) ───────
      # Exclude patterns already covered by named groups above to prevent duplication.

      dev-deps:
        applies-to: version-updates
        dependency-type: development
        update-types: ['minor', 'patch']
        exclude-patterns:
          # eslint
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@typescript-eslint/*'
          - '@vue/eslint-*'
          # vite
          - 'vite'
          - '@vitejs/*'
          - 'vite-*'
          # testing
          - 'vitest'
          - '@vitest/*'
          - '@vue/test-utils'
          - '@playwright/*'
          - 'happy-dom'
          - 'jsdom'
          # types
          - '@types/*'
          # i18n
          - 'i18next'
          - 'i18next-*'
          - 'vue-i18n-*'
          - 'i18n-*'
          - '@cospired/i18n-*'
          - '@intlify/*'
          # prisma
          - 'prisma'
          - '@prisma/*'
          - 'prisma-*'
          - 'zod-prisma-*'
          # vendor families also present in dev
          - '@fortawesome/*'
          - '@sentry/*'
          - 'fastify'
          - 'fastify-plugin'
          - '@fastify/*'
          - 'vue'
          - 'vue-router'
          - 'vue-i18n'
          - '@vue/*'
          - '@vueuse/*'
          - 'pinia'
          - 'bootstrap'
          - 'bootstrap-vue-next'
          - '@popperjs/*'
          - '@tensorflow/*'
          - '@tensorflow-models/*'
          - '@fontsource/*'

      prod-deps:
        applies-to: version-updates
        dependency-type: production
        update-types: ['minor', 'patch']
        exclude-patterns:
          # vendor families
          - '@fortawesome/*'
          - '@sentry/*'
          - 'fastify'
          - 'fastify-plugin'
          - '@fastify/*'
          - 'prisma'
          - '@prisma/*'
          - 'prisma-*'
          - 'zod-prisma-*'
          - 'vue'
          - 'vue-router'
          - 'vue-i18n'
          - '@vue/*'
          - '@vueuse/*'
          - 'pinia'
          - 'bootstrap'
          - 'bootstrap-vue-next'
          - '@popperjs/*'
          - '@tensorflow/*'
          - '@tensorflow-models/*'
          - '@fontsource/*'
          # i18n
          - 'i18next'
          - 'i18next-*'
          - 'vue-i18n-*'
          - 'i18n-*'
          - '@cospired/i18n-*'
          - '@intlify/*'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ['*']
