# Shared middleware definitions referenced by Docker Compose labels as @file
http:
  middlewares:
    compress:
      compress:
        excludedContentTypes:
          - image/webp
          - image/jpeg
          - image/png

    rate-limit:
      rateLimit:
        average: 10
        burst: 50
        period: 1s

    security-headers:
      headers:
        customResponseHeaders:
          X-Content-Type-Options: nosniff
          X-Frame-Options: DENY
          Referrer-Policy: strict-origin-when-cross-origin

    admin-header:
      headers:
        customRequestHeaders:
          X-Admin-Authenticated: "true"

    media-jwt:
      plugin:
        jwt:
          Keys:
            - "{{ env "JWT_SECRET" }}"
          Alg: HS256
          JwtSources:
            - type: cookie
              key: __session
          PayloadFields:
            - exp
