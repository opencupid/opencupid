# Traefik v3 static configuration
# Serves as a "dumb" TLS + routing proxy — no application secrets or logic.
# All service routing is declared via Docker Compose labels on each service.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${EMAIL}"
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    watch: true
  file:
    directory: /etc/traefik/dynamic/
    watch: true

log:
  level: INFO

accessLog: {}

api:
  dashboard: false
