<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-visual"
    />
    <title>${SITE_NAME}</title>

    <link
      rel="icon"
      type="image/png"
      href="/assets/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/assets/favicon.svg"
    />
    <link
      rel="shortcut icon"
      href="/assets/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <meta
      name="apple-mobile-web-app-title"
      content="${SITE_NAME}"
    />
    <link
      rel="manifest"
      href="/assets/site.webmanifest"
    />
    <meta
      name="theme-color"
      content="#325d88"
    />
    <script
      defer
      src="https://u.gaians.net/script.js"
      data-website-id="${UMAMI_WEBSITE_ID}"
    ></script>
  </head>

  <body
    style="
      margin: 0;
      min-height: 100dvh;
      background: linear-gradient(170deg, #dbc49c 0%, #e8d5b5 40%, #faf4ea 100%);
      background-attachment: fixed;
    "
  >
    <div
      id="splash"
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      "
    >
      <img
        src="/assets/logo.png"
        alt=""
        style="width: 25%; max-width: 200px; opacity: 0.8"
      />
    </div>
    <div
      id="app"
      class="d-flex flex-column h-100"
      style="height: 100dvh"
    ></div>
    <script src="/config.js"></script>
    <script>
      ;(function () {
        var m = document.cookie.match(/(?:^|;\s*)__o=([^;]+)/)
        if (!m) return
        var target = decodeURIComponent(m[1])
        if (target === window.location.hostname) return
        var p = window.location.pathname
        // Never bounce the sidecar path (would recurse) or /magic-link (the URL
        // is already authoritatively stamped by the backend with the user's
        // originDomain, and verify-token must run on the landing host so it can
        // overwrite stale __o cookies).
        if (p === '/_migrate' || p === '/magic-link') return
        var rest = window.location.search + window.location.hash
        window.location.replace('/_migrate?to=' + encodeURIComponent(p + rest))
      })()
    </script>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
