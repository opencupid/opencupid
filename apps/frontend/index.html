<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, interactive-widget=resizes-visual"
    />
    <meta
      property="og:title"
      content="${OG_TITLE}"
    />
    <title>${SITE_NAME}</title>
    <meta
      property="og:description"
      content="${OG_DESCRIPTION}"
    />
    <meta
      property="og:image"
      content="${OG_IMAGE}"
    />
    <meta
      property="og:url"
      content="${OG_URL}"
    />
    <meta
      property="og:type"
      content="${OG_TYPE}"
    />

    <link
      rel="icon"
      type="image/png"
      href="/assets/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/assets/favicon.svg"
    />
    <link
      rel="shortcut icon"
      href="/assets/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <meta
      name="apple-mobile-web-app-title"
      content="Gaians.net"
    />
    <link
      rel="manifest"
      href="/assets/site.webmanifest"
    />
    <meta
      name="theme-color"
      content="#008000"
    />
  </head>

  <body
    style="
      margin: 0;
      min-height: 100dvh;
      background: linear-gradient(170deg, #dbc49c 0%, #e8d5b5 40%, #faf4ea 100%);
      background-attachment: fixed;
    "
  >
    <div
      id="splash"
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      "
    >
      <img
        src="/assets/logo.png"
        alt=""
        style="width: 25%; max-width: 200px; opacity: 0.8"
      />
    </div>
    <div
      id="app"
      class="d-flex flex-column h-100"
      style="height: 100dvh"
    ></div>
    <script src="/config.js"></script>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
