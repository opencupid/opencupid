worker_processes 1;
env AUTH_IMG_HMAC_SECRET;
env CSP_REPORT_URI;
env DOMAIN;

events {
  worker_connections 1024;
}

error_log /dev/stderr error;

http {
  include mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;
  more_clear_headers Server;

  # --- Rate / connection limiting ---
  limit_req_zone  $binary_remote_addr  zone=req_per_ip:10m  rate=10r/s;
  limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;

  # --- Enable Gzip ---
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript font/woff2;

  # --- Shared security headers (called from each server block) ---
  init_by_lua_block {
    function set_security_headers(extra_csp)
      local domain = os.getenv("DOMAIN")
      ngx.header["X-Content-Type-Options"] = "nosniff"
      ngx.header["X-Frame-Options"] = "DENY"
      ngx.header["Referrer-Policy"] = "strict-origin-when-cross-origin"
      ngx.header["Permissions-Policy"] = 'camera=(self "https://meet.' .. domain .. '"), microphone=(self "https://meet.' .. domain .. '"), geolocation=(self)'

      local csp = "default-src 'self'"
        .. "; script-src 'self' https://*." .. domain
        .. "; style-src 'self' 'unsafe-inline'"
        .. "; img-src 'self' data: blob: https://api.maptiler.com"
        .. "; font-src 'self'"
        .. "; object-src 'none'"
        .. "; base-uri 'self'"
        .. "; form-action 'self'"
        .. "; frame-ancestors 'none'"

      if extra_csp and extra_csp ~= "" then
        csp = csp .. "; " .. extra_csp
      end

      local report_uri = os.getenv("CSP_REPORT_URI")
      if report_uri and report_uri ~= "" then
        csp = csp .. "; report-uri " .. report_uri
      end

      csp = csp .. "; upgrade-insecure-requests"

      ngx.header["Content-Security-Policy"] = csp
    end
  }

  # --- DNS resolver ---
  # Use Docker's embedded DNS resolver so nginx re-resolves service hostnames
  # after container replacement (docker compose up without down).
  # Without this, nginx caches the old container IP at startup and returns
  # 502 indefinitely after a hot-swap, preventing frontend recovery.
  resolver 127.0.0.11 valid=10s ipv6=off;

  include conf.d/active.conf;
}
