# Traefik v3 static configuration
# All service routing is declared via Docker Compose labels on each service.

experimental:
  localPlugins:
    jwt:
      moduleName: github.com/legege/jwt-validation-middleware

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    watch: true
    # Keep routers/services registered for containers that have exited so a
    # request matching their rule returns 502 instead of falling through to
    # a less-specific router (e.g. the SPA's Host-only catch-all). Requires
    # `traefik.docker.allownonrunning=true` on each opted-in container.
    allowEmptyServices: true
  file:
    directory: /etc/traefik/dynamic/
    watch: true

log:
  level: INFO

accessLog: {}

api:
  dashboard: false
