server {
  listen 3002;
  server_name localhost;

  root /var/www;
  index index.html;

  location = /config.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }


  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=43200";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
