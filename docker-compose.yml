services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - '1080:8025'
      - '1025:1025'
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  redis:
    image: redis:8
    command: redis-server --appendonly yes
    restart: unless-stopped
    ports:
      - '6379:6379'

  tolgee-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: tolgee
      POSTGRES_USER: tolgee
      POSTGRES_PASSWORD: tolgee
    volumes:
      - tolgee_postgres_data:/var/lib/postgresql/data

  tolgee:
    image: tolgee/tolgee
    restart: unless-stopped
    ports:
      - '8085:8080'
    environment:
      tolgee_postgres_autostart_enabled: false
      SPRING_DATASOURCE_URL: jdbc:postgresql://tolgee-db:5432/tolgee
      SPRING_DATASOURCE_USERNAME: tolgee
      SPRING_DATASOURCE_PASSWORD: tolgee
      TOLGEE_AUTHENTICATION_INITIAL_USERNAME: admin
      TOLGEE_AUTHENTICATION_INITIAL_PASSWORD: admin
      TOLGEE_AUTHENTICATION_CREATE_DEMO_FOR_INITIAL_USER: false
      TOLGEE_IMPORT_DIR: /import
      TOLGEE_IMPORT_CREATE_IMPLICIT_API_KEY: true
    volumes:
      - tolgee_data:/data
      - ./packages/shared/i18n:/import/opencupid:ro
    depends_on:
      - tolgee-db

  jitsi-web:
    image: jitsi/web:stable
    restart: unless-stopped
    ports:
      - '8443:443'
    volumes:
      - ./certs/fullchain.pem:/config/keys/cert.crt:ro
      - ./certs/privkey.pem:/config/keys/cert.key:ro
      - jitsi-meet-cfg-web:/config
    environment:
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - ENABLE_XMPP_WEBSOCKET=1
      - PUBLIC_URL=https://oc.dev.froggle.org:8443
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=UTC
    depends_on:
      - jitsi-prosody

  jitsi-prosody:
    image: jitsi/prosody:stable
    restart: unless-stopped
    volumes:
      - jitsi-meet-cfg-prosody:/config
    environment:
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_secret
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_secret
      - TZ=UTC

  jitsi-jicofo:
    image: jitsi/jicofo:stable
    restart: unless-stopped
    volumes:
      - jitsi-meet-cfg-jicofo:/config
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_secret
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=UTC
    depends_on:
      - jitsi-prosody

  jitsi-jvb:
    image: jitsi/jvb:stable
    restart: unless-stopped
    ports:
      - '10000:10000/udp'
    volumes:
      - jitsi-meet-cfg-jvb:/config
    environment:
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_secret
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=10000
      - DOCKER_HOST_ADDRESS=host.docker.internal
      - TZ=UTC
    depends_on:
      - jitsi-prosody

volumes:
  postgres_data:
  mailpit_data:
  jitsi-meet-cfg-web:
  jitsi-meet-cfg-prosody:
  jitsi-meet-cfg-jicofo:
  jitsi-meet-cfg-jvb:
  tolgee_postgres_data:
  tolgee_data:
