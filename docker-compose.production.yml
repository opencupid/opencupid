services:
  redis:
    image: redis:8
    command: redis-server --appendonly yes
    restart: always
    volumes:
      - redis-data:/data

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - ${POSTGRES_DATADIR}:/var/lib/postgresql/data

  backend:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-backend:${BACKEND_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - '${MEDIA_UPLOAD_DIR}:${MEDIA_UPLOAD_DIR}'
      - '${PWD}/secrets:/secrets'

  frontend:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-frontend:${FRONTEND_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      - backend

  admin:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-admin:${ADMIN_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      - backend

  ingress:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-ingress:${INGRESS_VERSION:-latest}
    build:
      context: apps/ingress
    restart: always
    depends_on:
      - admin
      - frontend
      - backend
      - jitsi-web
    env_file:
      - .env
    ports:
      - '443:443'
      - '80:80'
    volumes:
      - ${MEDIA_UPLOAD_DIR}:/var/www
      - ${CERTBOT_ETCDIR}:/etc/letsencrypt
      - certbot-webroot:/var/www/html
      - ${ADMIN_CA_CERT_FILE}:/etc/nginx/client-ca.crt:ro

  certbot:
    image: certbot/certbot
    profiles: ["tools"]
    env_file:
      - .env
    volumes:
      - ${CERTBOT_ETCDIR}:/etc/letsencrypt
      - certbot-webroot:/var/www/html

  jitsi-web:
    image: jitsi/web:stable
    restart: always
    volumes:
      - jitsi-meet-cfg-web:/config
    environment:
      - DISABLE_HTTPS=1
      - ENABLE_HTTP_REDIRECT=0
      - HTTP_PORT=80
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - ENABLE_XMPP_WEBSOCKET=1
      - PUBLIC_URL=https://meet.${DOMAIN}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=UTC
    depends_on:
      - jitsi-prosody

  jitsi-prosody:
    image: jitsi/prosody:stable
    restart: always
    volumes:
      - jitsi-meet-cfg-prosody:/config
    environment:
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - TZ=UTC

  jitsi-jicofo:
    image: jitsi/jicofo:stable
    restart: always
    volumes:
      - jitsi-meet-cfg-jicofo:/config
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=UTC
    depends_on:
      - jitsi-prosody

  jitsi-jvb:
    image: jitsi/jvb:stable
    restart: always
    ports:
      - '10000:10000/udp'
    volumes:
      - jitsi-meet-cfg-jvb:/config
    environment:
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=10000
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS}
      - TZ=UTC
    depends_on:
      - jitsi-prosody

volumes:
  redis-data:
    driver: local
  jitsi-meet-cfg-web:
  jitsi-meet-cfg-prosody:
  jitsi-meet-cfg-jicofo:
  jitsi-meet-cfg-jvb:
  certbot-webroot:
