services:
  redis:
    image: redis:8
    command: redis-server --appendonly yes
    restart: always
    volumes:
      - redis-data:/data

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - ${POSTGRES_DATADIR}:/var/lib/postgresql/data

  ingress:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-ingress:${INGRESS_VERSION:-latest}
    build:
      context: ./apps/ingress
    restart: always
    ports:
      - '443:443'
      - '80:80'
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${EMAIL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./apps/ingress/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./apps/ingress/dynamic/:/etc/traefik/dynamic/:ro
      - traefik-acme:/acme
      - ${ADMIN_CA_CERT_FILE}:/certs/admin-ca.crt:ro

  backend:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-backend:${BACKEND_VERSION:-latest}
    restart: always
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - '${MEDIA_UPLOAD_DIR}:${MEDIA_UPLOAD_DIR}'
    labels:
      traefik.enable: "true"

      # --- Public domain: API ---
      traefik.http.routers.api.rule: "Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      traefik.http.routers.api.entrypoints: websecure
      traefik.http.routers.api.middlewares: compress@file,rate-limit@file,public-sanitize@file
      traefik.http.services.backend.loadbalancer.server.port: "3000"

      # --- Public domain: WebSocket ---
      traefik.http.routers.ws.rule: "Host(`${DOMAIN}`) && PathPrefix(`/ws`)"
      traefik.http.routers.ws.entrypoints: websecure
      traefik.http.routers.ws.middlewares: public-sanitize@file

      # --- Admin domain: API + Bull Board (mTLS) ---
      traefik.http.routers.admin-backend.rule: "Host(`${ADMIN_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/bull-board`))"
      traefik.http.routers.admin-backend.entrypoints: websecure
      traefik.http.routers.admin-backend.tls.options: admin-mtls@file
      traefik.http.routers.admin-backend.middlewares: admin-header@file

  frontend:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-frontend:${FRONTEND_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    labels:
      traefik.enable: "true"
      traefik.http.routers.frontend.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.frontend.priority: "1"
      traefik.http.routers.frontend.entrypoints: websecure
      traefik.http.routers.frontend.middlewares: compress@file,rate-limit@file
      traefik.http.services.frontend.loadbalancer.server.port: "3001"

  admin:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/opencupid/opencupid}-admin:${ADMIN_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    labels:
      traefik.enable: "true"
      traefik.http.routers.admin.rule: "Host(`${ADMIN_DOMAIN}`)"
      traefik.http.routers.admin.priority: "1"
      traefik.http.routers.admin.entrypoints: websecure
      traefik.http.routers.admin.tls.options: admin-mtls@file
      traefik.http.services.admin.loadbalancer.server.port: "3002"

  media:
    image: nginx:alpine
    restart: always
    volumes:
      - '${MEDIA_UPLOAD_DIR}:/usr/share/nginx/html:ro'
    labels:
      traefik.enable: "true"
      traefik.http.routers.media.rule: "Host(`${DOMAIN}`) && PathPrefix(`/user-content`)"
      traefik.http.routers.media.entrypoints: websecure
      traefik.http.routers.media.middlewares: media-jwt,media-strip,media-cache
      traefik.http.middlewares.media-strip.stripprefix.prefixes: "/user-content"
      traefik.http.middlewares.media-jwt.plugin.jwt.secret: "${JWT_SECRET}"
      traefik.http.middlewares.media-jwt.plugin.jwt.authCookieName: "__session"
      traefik.http.middlewares.media-cache.headers.customresponseheaders.Cache-Control: "public, max-age=31536000, immutable"
      traefik.http.middlewares.media-cache.headers.customresponseheaders.X-Content-Type-Options: "nosniff"
      traefik.http.services.media.loadbalancer.server.port: "80"

  jitsi-web:
    image: jitsi/web:stable
    restart: always
    volumes:
      - jitsi-meet-cfg-web:/config
    environment:
      - DISABLE_HTTPS=1
      - ENABLE_HTTP_REDIRECT=0
      - HTTP_PORT=80
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - ENABLE_XMPP_WEBSOCKET=1
      - ENABLE_COLIBRI_WEBSOCKET=1
      - COLIBRI_WEBSOCKET_JVB_LOOKUP_NAME=jitsi-jvb
      - PUBLIC_URL=https://${JITSI_DOMAIN}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=UTC
    depends_on:
      - jitsi-prosody
    labels:
      traefik.enable: "true"
      traefik.http.routers.jitsi.rule: "Host(`${JITSI_DOMAIN}`)"
      traefik.http.routers.jitsi.entrypoints: websecure
      traefik.http.services.jitsi.loadbalancer.server.port: "80"

  jitsi-prosody:
    image: jitsi/prosody:stable
    restart: always
    volumes:
      - jitsi-meet-cfg-prosody:/config
    environment:
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - TZ=UTC

  jitsi-jicofo:
    image: jitsi/jicofo:stable
    restart: always
    volumes:
      - jitsi-meet-cfg-jicofo:/config
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=UTC
    depends_on:
      - jitsi-prosody

  jitsi-jvb:
    image: jitsi/jvb:stable
    restart: always
    ports:
      - '10000:10000/udp'
    volumes:
      - jitsi-meet-cfg-jvb:/config
    environment:
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=10000
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS}
      - COLIBRI_WEBSOCKET_ENABLED=true
      - COLIBRI_WEBSOCKET_DOMAIN=${JITSI_DOMAIN}
      - COLIBRI_WEBSOCKET_SERVER_ID=default-id
      - TZ=UTC
    depends_on:
      - jitsi-prosody

volumes:
  redis-data:
    driver: local
  traefik-acme:
  jitsi-meet-cfg-web:
  jitsi-meet-cfg-prosody:
  jitsi-meet-cfg-jicofo:
  jitsi-meet-cfg-jvb:

